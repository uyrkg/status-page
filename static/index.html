<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatusPage</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <svg class="logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="8" fill="#5865F2"/>
        <circle cx="18" cy="18" r="8" fill="#e4e6ed"/>
        <circle cx="18" cy="18" r="5" fill="#5865F2"/>
        <circle cx="18" cy="18" r="2" fill="#e4e6ed"/>
      </svg>
      <h1>StatusPage</h1>
    </div>
    <div class="header-status" id="headerStatus">
      <span>Loading...</span>
    </div>
  </header>

  <!-- Maintenance Banner -->
  <div class="maintenance-banner hidden" id="maintenanceBanner">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
    <span id="maintenanceText">Scheduled maintenance in progress</span>
  </div>

  <!-- Main Content -->
  <main class="container">

    <!-- Services Toolbar -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h2 class="section-title" style="margin-bottom:0">Services</h2>
      <button class="all-services-btn" id="allServicesBtn" onclick="toggleAllServices()" style="background:#21262d; color:#8b949e; border:1px solid #30363d; border-radius:6px; padding:6px 14px; font-size:13px; cursor:pointer; transition:all 0.2s;">Show All Services</button>
    </div>

    <!-- Endpoints Section -->
    <section class="section">
      <div class="endpoint-list" id="endpointList">
        <div class="empty-state">
          <p>Loading endpoints...</p>
        </div>
      </div>
    </section>

    <!-- Active Incidents Section -->
    <section class="section">
      <h2 class="section-title">Active Incidents</h2>
      <div class="incident-list" id="incidentList">
        <div class="empty-state" id="noIncidents">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
          </svg>
          <p>All systems are operational.</p>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>StatusPage &middot; Auto-refreshes every 30s &middot; <a href="/maintenance">View Maintenance Schedule</a> &middot; <a href="/admin/login">Admin</a></p>
  </footer>

  <script>
    const API_BASE = '';

    // Status display names
    const STATUS_LABELS = {
      all_operational: 'All Operational',
      degraded: 'Degraded Performance',
      partial_outage: 'Partial Outage',
      major_outage: 'Major Outage',
      maintenance: 'Under Maintenance'
    };

    // Incident status display names
    const INCIDENT_STATUS_LABELS = {
      investigating: 'Investigating',
      identified: 'Identified',
      monitoring: 'Monitoring',
      resolved: 'Resolved'
    };

    // Format timestamp
    function formatTime(isoString) {
      const d = new Date(isoString);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);

      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return d.toLocaleDateString();
    }

    // Format datetime for display
    function formatDateTime(isoString) {
      const d = new Date(isoString);
      return d.toLocaleString();
    }

    // Get overall status from status API
    async function fetchStatus() {
      try {
        const res = await fetch(`${API_BASE}/api/status`);
        if (!res.ok) throw new Error('Failed to fetch status');
        return await res.json();
      } catch (e) {
        console.error('Status fetch error:', e);
        return { status: 'unknown' };
      }
    }

    // Get endpoints with current status
    async function fetchEndpoints() {
      try {
        const res = await fetch(`${API_BASE}/api/endpoints`);
        if (!res.ok) throw new Error('Failed to fetch endpoints');
        return await res.json();
      } catch (e) {
        console.error('Endpoints fetch error:', e);
        return [];
      }
    }

    // Get active incidents
    async function fetchIncidents() {
      try {
        const res = await fetch(`${API_BASE}/api/incidents`);
        if (!res.ok) throw new Error('Failed to fetch incidents');
        return await res.json();
      } catch (e) {
        console.error('Incidents fetch error:', e);
        return [];
      }
    }

    // Get active maintenance windows
    async function fetchMaintenance() {
      try {
        const res = await fetch(`${API_BASE}/api/maintenance`);
        if (!res.ok) throw new Error('Failed to fetch maintenance');
        return await res.json();
      } catch (e) {
        console.error('Maintenance fetch error:', e);
        return [];
      }
    }

    // Render header status badge
    function renderHeaderStatus(status) {
      const el = document.getElementById('headerStatus');
      const label = STATUS_LABELS[status] || 'Unknown';
      const cssClass = status.replace('_', '-').toLowerCase();
      el.innerHTML = `
        <span class="status-badge ${cssClass}">
          <span class="dot"></span>
          ${label}
        </span>
      `;
    }

    // Render maintenance banner
    function renderMaintenanceBanner(windows) {
      const banner = document.getElementById('maintenanceBanner');
      const activeWindows = windows.filter(w => w.is_active);

      if (activeWindows.length === 0) {
        banner.classList.add('hidden');
        return;
      }

      const titles = activeWindows.map(w => w.title).join(', ');
      document.getElementById('maintenanceText').textContent = titles;
      banner.classList.remove('hidden');
    }

    // Render endpoint cards
    let showAllServices = false;

    function toggleAllServices() {
      showAllServices = !showAllServices;
      const btn = document.getElementById('allServicesBtn');
      btn.textContent = showAllServices ? 'Show Operational Only' : 'Show All Services';
      btn.style.borderColor = showAllServices ? '#58a6ff' : '#30363d';
      btn.style.color = showAllServices ? '#58a6ff' : '#8b949e';
      renderEndpoints(endpointsData); // Re-render with current data
    }

    function renderEndpoints(endpoints) {
      const container = document.getElementById('endpointList');

      if (!endpoints || endpoints.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>No endpoints configured yet.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = endpoints.map(ep => {
        const statusClass = ep.current_status || 'operational';
        const responseTime = ep.response_time_ms != null ? `${ep.response_time_ms}ms` : '—';
        const lastCheck = ep.last_check ? formatTime(ep.last_check) : '—';

        return `
          <div class="endpoint-card">
            <div class="endpoint-info">
              <h3>${escapeHtml(ep.name)}</h3>
              <span>${escapeHtml(ep.host || ep.url || '—')}</span>
            </div>
            <div class="endpoint-status">
              <span class="dot ${statusClass}"></span>
              <span class="label ${statusClass}">${statusClass}</span>
            </div>
            <div class="endpoint-meta">
              <div class="response-time">${responseTime}</div>
              <div class="last-check">${lastCheck}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Render incident cards
    function renderIncidents(incidents) {
      const container = document.getElementById('incidentList');
      const noIncidents = document.getElementById('noIncidents');

      // Filter for unresolved incidents
      const activeIncidents = incidents.filter(inc => !inc.resolved_at);

      if (activeIncidents.length === 0) {
        noIncidents.style.display = 'block';
        // Remove any incident cards
        container.querySelectorAll('.incident-card').forEach(el => el.remove());
        return;
      }

      noIncidents.style.display = 'none';

      container.innerHTML = activeIncidents.map(inc => {
        const statusLine = buildStatusLine(inc.status);

        return `
          <div class="incident-card ${inc.severity}">
            <div class="incident-header">
              <span class="incident-title">${escapeHtml(inc.title)}</span>
              <span class="severity-badge ${inc.severity}">${inc.severity}</span>
            </div>
            <div class="incident-meta">
              <span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
                ${formatDateTime(inc.started_at)}
              </span>
              <span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                </svg>
                ${escapeHtml(inc.endpoint_name || 'Unknown Endpoint')}
              </span>
            </div>
            ${inc.description ? `<p class="incident-description">${escapeHtml(inc.description)}</p>` : ''}
            <div class="incident-status-line">
              ${statusLine}
            </div>
          </div>
        `;
      }).join('');
    }

    // Build status progression line for incidents
    function buildStatusLine(currentStatus) {
      const steps = ['investigating', 'identified', 'monitoring', 'resolved'];
      const currentIdx = steps.indexOf(currentStatus);

      return steps.map((step, idx) => {
        let cls = 'status-step';
        if (idx < currentIdx) cls += ' resolved';
        else if (idx === currentIdx) cls += ' active';

        const label = INCIDENT_STATUS_LABELS[step];
        let html = `<span class="${cls}">${label}</span>`;
        if (idx < steps.length - 1) {
          html += `<span class="arrow">→</span>`;
        }
        return html;
      }).join('');
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Main refresh function
    let endpointsData = [];
    let incidentsData = [];

    async function refresh() {
      const [statusData, endpoints, incidents, maintenanceData] = await Promise.all([
        fetchStatus(),
        fetchEndpoints(),
        fetchIncidents(),
        fetchMaintenance()
      ]);

      endpointsData = endpoints;
      incidentsData = incidents;

      renderHeaderStatus(statusData.status);
      renderMaintenanceBanner(maintenanceData);
      renderEndpoints(endpoints);
      renderIncidents(incidents);
    }

    // Initialize
    refresh();
    // Auto-refresh every 30 seconds
    setInterval(refresh, 30000);
  </script>

</body>
</html>
